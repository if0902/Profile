<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ふうみのパンダページ</title>

<style>
body{
    background:#e8f8ff;
    text-align:center;
    font-family:sans-serif;
    overflow:hidden;
}

h1{
    color:#ff6fa8;
}

.panda{
    position:absolute;
    font-size:80px;
    bottom:50px;
    left:-100px;
    animation: movePanda 8s linear infinite;
}

@keyframes movePanda{
    0%{
        left:-100px;
    }
    50%{
        transform: scaleX(1);
    }
    51%{
        transform: scaleX(-1);
    }
    100%{
        left:110%;
        transform: scaleX(-1);
    }
}

.card{
    background:white;
    width:350px;
    margin:80px auto;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="card">
<h1>🌸ふうみの自己紹介🌸</h1>
<p><strong>名前：</strong>いしだ ふうみ</p>
<p>こんにちは！</p>
<p>パンダが遊びにきました 🐼✨</p>
</div>

<div class="panda">🐼</div>

</body>
</html>
